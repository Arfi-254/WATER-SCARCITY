<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – Maji Safi</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; background: var(--surface2); }
    .auth-card { background: var(--white); border-radius: var(--radius-lg); padding: 40px; width: 100%; max-width: 440px; box-shadow: var(--shadow-md); border: 1px solid var(--border); }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-header .logo { justify-content: center; margin-bottom: 12px; }
    .auth-header h1 { font-family: var(--font-display); font-size: 1.8rem; color: var(--primary-dark); }
    .auth-error { color: var(--danger); font-size: 0.875rem; background: #fee2e2; border: 1px solid #fca5a5; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: none; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-muted); }
    .auth-footer a { color: var(--primary); font-weight: 600; }
  </style>
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-header">
    <a href="index.html" class="logo">
      <span class="logo-drop">💧</span>
      <span>MAJI SAFI</span>
    </a>
    <h1>Create Account</h1>
    <p>Join the Maji Safi community</p>
  </div>

  <div id="signupError" class="auth-error"></div>

  <form id="signupForm">
    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" required placeholder="e.g. Hassan Mohamed"/>
    </div>
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" required placeholder="e.g. name@example.com"/>
    </div>
    <div class="form-group">
      <label for="county">County</label>
      <select id="county" required>
        <option value="">Select your county</option>
        <option value="Garissa">Garissa</option>
        <option value="Wajir">Wajir</option>
        <option value="Mandera">Mandera</option>
      </select>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" required placeholder="••••••••" minlength="6"/>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
  </form>

  <div class="auth-footer">
    Already have an account? <a href="login.html">Sign in</a>
  </div>
</div>

<script src="auth.js"></script>
<script>
  document.getElementById('signupForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const county = document.getElementById('county').value;
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('signupError');
    const btn = e.target.querySelector('button[type="submit"]');

    btn.textContent = 'Creating Account...';
    btn.disabled = true;
    errEl.style.display = 'none';

    setTimeout(() => {
      try {
        signup(name, email, password, county);
        login(email, password); // Log in immediately after signup
        window.location.href = 'dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.textContent = 'Sign Up';
        btn.disabled = false;
      }
    }, 800); // Simulated network delay
  });
</script>
</body>
</html>
