<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Maji Safi</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="auth.js"></script>
</head>
<body style="background: var(--surface2); height: 100vh; display: flex; align-items: center; justify-content: center;">

<div style="width: 100%; max-width: 400px; padding: 20px;">
  <div style="text-align: center; margin-bottom: 30px;">
    <a href="index.html" class="logo" style="justify-content: center;">
      <span class="logo-drop">💧</span>
      <span>MAJI SAFI</span>
    </a>
  </div>

  <div style="background: var(--white); border-radius: var(--radius-lg); padding: 40px; box-shadow: var(--shadow); border: 1px solid var(--border);">
    <h2 style="font-family: var(--font-display); margin-bottom: 10px;">Login</h2>
    <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem;">Enter your credentials to access your dashboard.</p>

    <form id="loginForm">
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="email" style="display: block; margin-bottom: 8px; font-weight: 500;">Email Address</label>
        <input type="email" id="email" class="form-control" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius);">
      </div>

      <div class="form-group" style="margin-bottom: 30px;">
        <label for="password" style="display: block; margin-bottom: 8px; font-weight: 500;">Password</label>
        <input type="password" id="password" class="form-control" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius);">
      </div>

      <button type="submit" class="btn btn-primary btn-block" style="padding: 14px;">Sign In</button>
    </form>

    <div style="margin-top: 30px; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
      Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 600;">Sign up here</a>
    </div>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
