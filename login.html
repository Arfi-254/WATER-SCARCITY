<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Maji Safi</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; background: var(--surface2); }
    .auth-card { background: var(--white); border-radius: var(--radius-lg); padding: 40px; width: 100%; max-width: 440px; box-shadow: var(--shadow-md); border: 1px solid var(--border); }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-header .logo { justify-content: center; margin-bottom: 12px; }
    .auth-header h1 { font-family: var(--font-display); font-size: 1.8rem; color: var(--primary-dark); }
    .auth-error { color: var(--danger); font-size: 0.875rem; background: #fee2e2; border: 1px solid #fca5a5; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: none; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-muted); }
    .auth-footer a { color: var(--primary); font-weight: 600; }
  </style>
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-header">
    <a href="index.html" class="logo">
      <span class="logo-drop">💧</span>
      <span>MAJI SAFI</span>
    </a>
    <h1>Welcome Back</h1>
    <p>Sign in to your account</p>
  </div>

  <div id="loginError" class="auth-error"></div>

  <form id="loginForm">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" required placeholder="e.g. name@example.com"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" required placeholder="••••••••"/>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
  </form>

  <div class="auth-footer">
    Don't have an account? <a href="signup.html">Create one</a>
  </div>
</div>

<script src="auth.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('loginError');
    const btn = e.target.querySelector('button[type="submit"]');

    btn.textContent = 'Signing in...';
    btn.disabled = true;
    errEl.style.display = 'none';

    setTimeout(() => {
      try {
        const user = login(email, password);
        if (user.role === 'admin') {
          window.location.href = 'admin/index.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    }, 800); // Simulated network delay
  });
</script>
</body>
</html>
