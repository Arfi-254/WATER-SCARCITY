<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boreholes - Maji Safi</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="auth.js"></script>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <span class="logo-drop">💧</span>
      <span>MAJI SAFI</span>
    </a>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
    </ul>
  </div>
</nav>

<div class="page-hero">
  <div class="container">
    <span class="badge">Directory</span>
    <h1>Water Points</h1>
    <p>Find working boreholes and wells in Garissa, Wajir, and Mandera.</p>
  </div>
</div>

<section class="filters-bar">
  <div class="container">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search points..." class="search-input"/>
    </div>
    <div class="filter-group">
      <label>County</label>
      <select id="filterCounty" class="filter-select">
        <option value="">All Counties</option>
        <option value="Garissa">Garissa</option>
        <option value="Wajir">Wajir</option>
        <option value="Mandera">Mandera</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Status</label>
      <select id="filterStatus" class="filter-select">
        <option value="">All Status</option>
        <option value="Working">Working</option>
        <option value="Not Working">Not Working</option>
        <option value="Under Repair">Under Repair</option>
      </select>
    </div>
    <button class="btn btn-outline btn-sm" id="clearFilters">Reset</button>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="results-meta">
      <p id="resultsCount">Checking sources...</p>
    </div>
    <div class="sources-grid" id="sourcesGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <p>No results found for these filters.</p>
      <button class="btn btn-outline btn-sm" onclick="clearAllFilters()">Clear Filters</button>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container footer-inner">
    <div class="footer-brand">
      <strong>MAJI SAFI</strong>
    </div>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="source.html">Water Sources</a>
    </div>
  </div>
</footer>

<script src="main.js"></script>
<script src="source.js"></script>
</body>
</html>
