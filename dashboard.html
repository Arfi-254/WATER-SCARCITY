<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - Maji Safi</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

<script src="auth.js"></script>
<script>requireAuth('user');</script>

<nav class="navbar">
  <div class="nav-inner">
    <a href="dashboard.html" class="logo">
      <span class="logo-drop">💧</span>
      <span>MAJI SAFI</span>
    </a>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
    </ul>
  </div>
</nav>

<section class="user-welcome">
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
      <div>
        <span class="badge" id="userCounty"></span>
        <h1 id="welcomeText">Dashboard</h1>
        <p>Access your water reports and county updates here.</p>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <div class="container user-grid">
    <div class="user-main-card">
      <div class="card-title">
        <span>Recent Reports</span>
        <a href="report.html" class="btn btn-primary btn-sm">+ New Report</a>
      </div>
      <div id="userReportsList">
      </div>
    </div>

    <div class="user-side-card">
      <div class="card-title">My Profile</div>
      <div class="contact-list">
        <div class="contact-item">
          <span>📧</span>
          <div>
            <strong>Email</strong>
            <p id="userEmail"></p>
          </div>
        </div>
        <div class="contact-item">
          <span>📍</span>
          <div>
            <strong>County</strong>
            <p id="profileCounty"></p>
          </div>
        </div>
      </div>
      <hr style="margin:20px 0; border:0; border-top:1px solid var(--border);">
      <p style="font-size:0.85rem; color:var(--text-muted);">Reports are sent to the <span id="countyName"></span> Water Office.</p>
    </div>
  </div>
</section>

<script src="userDashboard.js"></script>
</body>
</html>
